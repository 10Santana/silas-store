<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Silas Store | Estamparia Profissional</title>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; background-color: #f8f9fa; color: #333; }
        
        /* Menu Superior Estilo Primos */
        nav { background: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ddd; }
        .logo { font-size: 24px; font-weight: bold; color: #2c3e50; }
        .menu-links a { margin-left: 20px; text-decoration: none; color: #555; font-weight: bold; }
        
        /* Hero Section (Área principal) */
        .hero { display: flex; align-items: center; padding: 50px; background: white; }
        .hero-text { flex: 1; padding-right: 50px; }
        .hero-text h1 { font-size: 48px; color: #2c3e50; }
        .hero-buttons { margin-top: 20px; }
        
        .btn-cta { padding: 15px 30px; border: none; border-radius: 30px; color: white; font-weight: bold; cursor: pointer; margin-right: 10px; }
        .btn-whatsapp { background-color: #e74c3c; }
        .btn-email { background-color: #34495e; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">SILAS STORE</div>
        <div class="menu-links">
            <a href="#">LAR</a>
            <a href="#">QUEM SOMOS</a>
            <a href="#">GALERIA</a>
            <a href="#">CONTATO</a>
        </div>
    </nav>

    <div class="hero">
        <div class="hero-text">
            <h1>ESTAMPARIA DE CAMISETAS E TECIDOS</h1>
            <p>Transforme suas ideias em realidade com a nossa estamparia! Qualidade, durabilidade e cores vibrantes.</p>
            <div class="hero-buttons">
                <button class="btn-cta btn-whatsapp">ORÇAMENTO VIA WHATSAPP</button>
                <button class="btn-cta btn-email">ORÇAMENTO VIA E-MAIL</button>
            </div>
        </div>
        <div class="hero-image">
            <img src="https://via.placeholder.com/400" alt="Camiseta">
        </div>
    </div>

</body>
</html>
