<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Silas Store | Loja Oficial</title>
    <style>
        /* Estilização focada no exemplo enviado */
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        
        /* Cabeçalho */
        header { background-color: #ffffff; padding: 20px; text-align: center; border-bottom: 3px solid #dee2e6; }
        
        /* Container principal */
        .container { max-width: 900px; margin: 20px auto; padding: 20px; }
        
        /* Grid de Produtos */
        .loja-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .produto-card { background: #ffffff; padding: 15px; border-radius: 8px; border: 1px solid #e0e0e0; text-align: center; }
        
        /* Área do Formulário de Checkout */
        .checkout-area { background: #ffffff; padding: 30px; border-radius: 8px; margin-top: 30px; border: 1px solid #e0e0e0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #495057; }
        input { width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 4px; box-sizing: border-box; }
        
        .btn-finalizar { background-color: #28a745; color: white; padding: 15px; width: 100%; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; margin-top: 10px; }
        .btn-finalizar:hover { background-color: #218838; }
    </style>
</head>
<body>

    <header>
        <h1>Silas Store</h1>
    </header>

    <div class="container">
        <!-- Vitrine -->
        <div class="loja-grid">
            <div class="produto-card">
                <h3>Caneca de Porcelana</h3>
                <p>R$ 70,90</p>
            </div>
            <div class="produto-card">
                <h3>Camiseta Preta</h3>
                <p>R$ 120,00</p>
            </div>
        </div>

        <!-- Formulário de Dados -->
        <div class="checkout-area">
            <h2>Finalizar Pedido</h2>
            <div class="input-group"><label>Nome Completo</label><input type="text"></div>
            <div class="input-group"><label>Endereço</label><input type="text"></div>
            <div class="input-group"><label>CEP</label><input type="text" placeholder="00000-000"></div>
            <button class="btn-finalizar" onclick="finalizarCompra()">Realizar Pagamento</button>
        </div>
    </div>

    <script>
        function finalizarCompra() {
            alert("Processando pagamento...");
            // Lógica de integração com API de pagamento será inserida aqui
        }
    </script>
</body>
</html>
