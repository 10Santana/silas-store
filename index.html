<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silas Store | Loja Oficial</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; color: #333; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #1a365d; margin-bottom: 30px; }
        
        .loja-container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .produto-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 250px; text-align: center; }
        .produto-card img { width: 100%; border-radius: 10px; }
        
        .frete-container { background: #fff; padding: 20px; border-radius: 10px; max-width: 400px; margin: 30px auto; border: 1px solid #ddd; text-align: center; }
        input { padding: 10px; width: 60%; border: 1px solid #ccc; border-radius: 5px; }
        .btn-frete { background: #3182ce; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        
        .btn-checkout { background-color: #e53e3e; color: white; padding: 15px 40px; border: none; border-radius: 30px; font-size: 18px; cursor: pointer; display: block; margin: 20px auto; }
    </style>
</head>
<body>

    <h1>Silas Store</h1>

    <div class="loja-container">
        <div class="produto-card">
            <img src="imagens/CanecaPreta.jpeg" alt="Caneca">
            <h3>Caneca de Porcelana</h3>
            <p style="color: #27ae60; font-weight: bold;">R$ 70,90</p>
        </div>

        <div class="produto-card">
            <img src="imagens/CamisetaPreta.jpeg" alt="Camiseta">
            <h3>Camiseta Preta</h3>
            <p style="color: #27ae60; font-weight: bold;">R$ 120,00</p>
        </div>
    </div>

    <div class="frete-container">
        <h3>Calcular Frete</h3>
        <input type="text" id="cep" placeholder="Digite seu CEP (00000-000)">
        <button class="btn-frete" onclick="calcularFrete()">Calcular</button>
        <p id="resultadoFrete" style="margin-top: 10px;"></p>
    </div>

    <button class="btn-checkout" onclick="finalizarCompra()">Finalizar Compra</button>

    <script>
        function calcularFrete() {
            const cep = document.getElementById('cep').value;
            const res = document.getElementById('resultadoFrete');
            if (cep.length >= 8) {
                res.innerText = "Frete para " + cep + ": R$ 15,90";
                res.style.color = "green";
            } else {
                res.innerText = "CEP inválido.";
                res.style.color = "red";
            }
        }

        async function finalizarCompra() {
            const dadosEntrega = { nome: "Ailton", whatsapp: "11945140678" };
            const itens = [
                { id: 1, nome: "Caneca de Porcelana", preco: 70.90 },
                { id: 3, nome: "Camiseta Preta", preco: 120.00 }
            ];

            try {
                const response = await fetch('/api/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ dadosEntrega, itens })
                });

                const data = await response.json();
                if (data.init_point) {
                    window.location.href = data.init_point;
                } else {
                    alert("Erro ao criar pagamento.");
                }
            } catch (error) {
                console.error("Erro:", error);
                alert("Erro ao conectar ao servidor.");
            }
        }
    </script>
</body>
</html>
