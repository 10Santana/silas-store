<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Silas Store | Loja Oficial</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; }
        header { text-align: center; padding: 20px; background: white; border-bottom: 2px solid #ddd; }
        .container { max-width: 900px; margin: 20px auto; }
        
        .loja-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .produto-card { background: white; padding: 15px; border-radius: 8px; border: 1px solid #e0e0e0; text-align: center; }
        .produto-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
        
        .checkout-area { background: white; padding: 30px; border-radius: 8px; margin-top: 30px; border: 1px solid #e0e0e0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        .btn-acao { background-color: #28a745; color: white; padding: 15px; width: 100%; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>Silas Store</h1>
    </header>

    <div class="container">
        <!-- Vitrine de Produtos -->
        <div class="loja-grid">
            <div class="produto-card">
                <img src="imagens/CamisetaPreta.jpeg" alt="Camiseta Preta">
                <h3>Camiseta Preta</h3>
                <p>R$ 120,00</p>
            </div>
            <div class="produto-card">
                <img src="imagens/CanecaPreta.jpeg" alt="Caneca Preta">
                <h3>Caneca de Porcelana</h3>
                <p>R$ 70,90</p>
            </div>
        </div>

        <!-- Área de Checkout e Frete -->
        <div class="checkout-area">
            <h2>Finalizar Pedido</h2>
            <div class="input-group"><label>Nome Completo</label><input type="text" id="nome"></div>
            <div class="input-group"><label>Endereço de Entrega</label><input type="text" id="endereco"></div>
            <div class="input-group"><label>CEP</label><input type="text" id="cep" placeholder="00000-000"></div>
            <button class="btn-acao" style="background:#007bff;" onclick="calcularFrete()">Calcular Frete</button>
            <p id="resultadoFrete" style="font-weight:bold; margin-top:10px;"></p>
            
            <button class="btn-acao" onclick="finalizarCompra()">Realizar Pagamento</button>
        </div>
    </div>

    <script>
        function calcularFrete() {
            const cep = document.getElementById('cep').value;
            if(cep.length >= 8) {
                document.getElementById('resultadoFrete').innerText = "Frete para " + cep + ": R$ 15,90";
            } else {
                alert("Digite um CEP válido");
            }
        }

        async function finalizarCompra() {
            const nome = document.getElementById('nome').value;
            if(!nome) return alert("Preencha seu nome");
            
            alert("Redirecionando " + nome + " para o pagamento...");
            // Aqui entra sua lógica do fetch para o checkout.js
        }
    </script>
</body>
</html>
