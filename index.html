<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Silas Store | Loja Oficial</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; }
        .produtos-container { display: flex; justify-content: center; gap: 20px; padding: 20px; flex-wrap: wrap; }
        .card { background: white; padding: 20px; border-radius: 10px; width: 200px; border: 2px solid #ddd; }
        .esgotado { opacity: 0.5; filter: grayscale(100%); pointer-events: none; }
        .btn-add { background: #007bff; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px; }
        .form-area { max-width: 400px; margin: 20px auto; background: white; padding: 20px; border-radius: 10px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        .btn-acao { background: #28a745; color: white; padding: 15px; border: none; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <h1>SILAS STORE</h1>
    <div class="produtos-container" id="loja">
        <!-- Gerado pelo JavaScript abaixo -->
    </div>

    <div class="form-area">
        <input type="text" id="nome" placeholder="Nome Completo">
        <input type="text" id="endereco" placeholder="Endereço">
        <input type="text" id="whatsapp" placeholder="WhatsApp">
        <button class="btn-acao" onclick="finalizarCompra()">FINALIZAR COMPRA</button>
    </div>

    <script>
        // CONFIGURAÇÃO
        const URL_GOOGLE_SCRIPT = 'https://script.google.com/macros/s/AKfycbzyTARXWqXrMN7zZv-s-_EEpAObJR5Ybnde5Q7ogFqsNlEwSw4Yt3V_q3cnwAENINB3/exec';
        const VALOR_FRETE = 15.90;
        
        let produtos = [
            { id: 1, nome: 'Camiseta Preta', preco: 120.00, estoque: 5 },
            { id: 2, nome: 'Caneca Vermelha', preco: 80.00, estoque: 0 },
            { id: 3, nome: 'Caneca Preta', preco: 70.00, estoque: 11 }
        ];
        let carrinho = [];

        // Renderiza produtos na tela
        const container = document.getElementById('loja');
        produtos.forEach(p => {
            const card = document.createElement('div');
            card.className = 'card' + (p.estoque === 0 ? ' esgotado' : '');
            card.innerHTML = `<h3>${p.nome}</h3><p>R$ ${p.preco.toFixed(2)}</p>
                              <button class="btn-add" onclick="adicionar('${p.nome}', ${p.preco})">Adicionar</button>`;
            container.appendChild(card);
        });

        function adicionar(nome, preco) {
            carrinho.push({ nome, preco });
            alert(nome + " adicionado!");
        }

        async function finalizarCompra() {
            const nome = document.getElementById('nome').value;
            const endereco = document.getElementById('endereco').value;
            const whatsapp = document.getElementById('whatsapp').value;

            if(carrinho.length === 0) return alert("Carrinho vazio!");
            if(!nome || !endereco || !whatsapp) return alert("Preencha os dados!");

            const total = carrinho.reduce((acc, item) => acc + item.preco, 0) + VALOR_FRETE;
            const nomesItens = carrinho.map(i => i.nome).join(", ");

            // Envia e-mail
            fetch(URL_GOOGLE_SCRIPT, {
                method: 'POST',
                body: new URLSearchParams({ nome, endereco, whatsapp, produto: nomesItens, total: total.toFixed(2) })
            });

            // Redireciona para Checkout (seu backend original)
            const res = await fetch('/api/checkout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ itens: carrinho, total })
            });
            const data = await res.json();
            if(data.init_point) window.location.href = data.init_point;
        }
    </script>
</body>
</html>
