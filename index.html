<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silas Store | Loja Oficial</title>
    <style>
        /* Estilos Profissionais */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; color: #333; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 40px; }
        
        .loja-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; }
        
        .produto-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 220px; transition: transform 0.2s; }
        .produto-card:hover { transform: scale(1.05); }
        
        .produto-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; }
        .produto-card h3 { margin: 10px 0; font-size: 1.1em; }
        .produto-card p { font-weight: bold; color: #27ae60; font-size: 1.2em; }

        .btn-checkout { background-color: #e67e22; color: white; padding: 15px 40px; border: none; border-radius: 30px; font-size: 18px; cursor: pointer; display: block; margin: 40px auto; transition: background 0.3s; }
        .btn-checkout:hover { background-color: #d35400; }
    </style>
</head>
<body>

    <h1>Silas Store</h1>

    <div class="loja-container">
        <div class="produto-card">
            <img src="imagens/CanecaPreta.jpeg" alt="Caneca">
            <h3>Caneca de Porcelana</h3>
            <p>R$ 70,90</p>
        </div>

        <div class="produto-card">
            <img src="imagens/CamisetaPreta.jpeg" alt="Camiseta">
            <h3>Camiseta Preta</h3>
            <p>R$ 120,00</p>
        </div>
    </div>

    <button class="btn-checkout" onclick="finalizarCompra()">Finalizar Compra</button>

    <script>
        async function finalizarCompra() {
            const dadosEntrega = { nome: "Ailton", whatsapp: "11945140678" };
            const itens = [
                { id: 1, nome: "Caneca de Porcelana", preco: 70.90 },
                { id: 3, nome: "Camiseta Preta", preco: 120.00 }
            ];

            try {
                const response = await fetch('/api/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ dadosEntrega, itens })
                });

                const data = await response.json();

                if (data.init_point) {
                    window.location.href = data.init_point;
                } else {
                    alert("Erro ao criar pagamento.");
                }
            } catch (error) {
                console.error("Erro:", error);
                alert("Erro ao conectar ao servidor.");
            }
        }
    </script>
</body>
</html>
